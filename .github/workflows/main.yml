name: Build Specific Module from Repository of Multiple Modules

env:
  project_url: "https://github.com/${{github.repository}}"

on:
  workflow_dispatch:
    inputs:
      module_name:
        description: 'Module directory name to build'
        required: true
        type: choice
        options:
          - dnd5e-homebrew
          - pfsf2e-homebrew
          - ttrpg-assets
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      releases: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Module Directory
        id: module_dir
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            MODULE_DIR="${{ github.event.inputs.module_name }}"
          else
            MODULE_DIR=$(echo "${{ github.event.release.tag_name }}" | sed 's/-v[0-9].*//')
          fi
          echo "module_dir=$MODULE_DIR" >> $GITHUB_OUTPUT
          echo "Building module from: $MODULE_DIR"

      - name: Verify Module Directory
        run: |
          if [ ! -d "${{ steps.module_dir.outputs.module_dir }}" ]; then
            echo "Error: Module directory '${{ steps.module_dir.outputs.module_dir }}' not found"
            exit 1
          fi
          if [ ! -f "${{ steps.module_dir.outputs.module_dir }}/module.json" ]; then
            echo "Error: module.json not found in ${{ steps.module_dir.outputs.module_dir }}"
            exit 1
          fi

      - name: Extract Version From Tag
        id: get_version
        uses: battila7/get-version-action@v2
        if: github.event_name == 'release'

      - name: Set Version For Workflow Dispatch
        id: set_version
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="0.1.0"
          echo "version-without-v=$VERSION" >> $GITHUB_OUTPUT

      - name: Resolve Version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ steps.set_version.outputs.version-without-v }}"
          else
            VERSION="${{ steps.get_version.outputs.version-without-v }}"
          fi
          echo "resolved_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update Module Manifest
        run: |
          MODULE_DIR="${{ steps.module_dir.outputs.module_dir }}"
          MODULE_NAME=$(basename "$MODULE_DIR")
          VERSION="${{ steps.version.outputs.resolved_version }}"
          
          # Update module.json with correct URLs
          jq --arg version "$VERSION" \
             --arg url "${{ env.project_url }}" \
             --arg manifest "https://github.com/${{ github.repository }}/releases/download/${MODULE_NAME}-v${VERSION}/module.json" \
             --arg download "https://github.com/${{ github.repository }}/releases/download/${MODULE_NAME}-v${VERSION}/module.zip" \
             '.version = $version | .url = $url | .manifest = $manifest | .download = $download' \
             "$MODULE_DIR/module.json" > "$MODULE_DIR/module.json.tmp" && \
             mv "$MODULE_DIR/module.json.tmp" "$MODULE_DIR/module.json"
          
          echo "Updated $MODULE_DIR/module.json:"
          cat "$MODULE_DIR/module.json"

      - name: Create Module Archive
        run: |
          MODULE_DIR="${{ steps.module_dir.outputs.module_dir }}"
          MODULE_NAME=$(basename "$MODULE_DIR")
          
          cd "$MODULE_DIR"
          zip -r ../module.zip \
            module.json \
            README.md \
            LICENSE \
            templates/ \
            assets/ \
            scripts/ \
            styles/ \
            packs/ \
            language/ \
            lang/ 2>/dev/null || true
          
          if [ ! -f "../module.zip" ]; then
            echo "Error: Failed to create module archive"
            exit 1
          fi
          
          echo "Created archive: ../module.zip"
          ls -lh ../module.zip

      - name: Copy Files to Root
        run: |
          MODULE_DIR="${{ steps.module_dir.outputs.module_dir }}"
          cp "$MODULE_DIR/module.json" ./module.json
          echo "Files ready for release"
          ls -lh ./module.json ./module.zip

      - name: Upload Artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: module-${{ github.event.inputs.module_name }}
          path: |
            ./module.zip
            ./module.json

      - name: Update Release With Files
        if: github.event_name == 'release'
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name: ${{ github.event.release.name }}
          draft: ${{ github.event.release.unpublished }}
          prerelease: ${{ github.event.release.prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "./module.json,./module.zip"
          tag: ${{ github.event.release.tag_name }}
          body: ${{ github.event.release.body }}